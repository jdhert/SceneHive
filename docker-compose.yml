services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${DB_USER:-testuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testuser}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5433:5432" # 외부 5433 → 내부 5432 (로컬 PostgreSQL과 충돌 방지)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-testuser} -d ${DB_NAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-testuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-testuser}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8081/login/oauth2/code/google}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-placeholder-client-id}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-placeholder-client-secret}
      KAKAO_CLIENT_AUTH_METHOD: ${KAKAO_CLIENT_AUTH_METHOD:-none}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-placeholder-client-id}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-placeholder-client-secret}
      NAVER_CLIENT_AUTH_METHOD: ${NAVER_CLIENT_AUTH_METHOD:-client_secret_post}
      MAIL_HOST: "smtp.gmail.com"
      MAIL_PORT: "587"
      MAIL_USERNAME: "${MAIL_USERNAME:-your-email@gmail.com}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-your-app-password}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_FILE_STORAGE_UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  # Next.js Frontend (Standalone)
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: auth-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8081
      TMDB_API_KEY: ${TMDB_API_KEY:-placeholder-tmdb-api-key}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
