services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${DB_USER:-testuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testuser}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5433:5432" # 외부 5433 → 내부 5432 (로컬 PostgreSQL과 충돌 방지)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-testuser} -d ${DB_NAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.2
    container_name: auth-kafka
    profiles:
      - kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1}
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.2
    profiles:
      - kafka
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.retry.1m.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.retry.5m.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.dlq.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1

  # Spring Boot Backend
  backend:
    image: scenehive-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-testuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-testuser}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8081/login/oauth2/code/google}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-placeholder-client-id}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-placeholder-client-secret}
      KAKAO_CLIENT_AUTH_METHOD: ${KAKAO_CLIENT_AUTH_METHOD:-none}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-placeholder-client-id}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-placeholder-client-secret}
      NAVER_CLIENT_AUTH_METHOD: ${NAVER_CLIENT_AUTH_METHOD:-client_secret_post}
      MAIL_HOST: "smtp.gmail.com"
      MAIL_PORT: "587"
      MAIL_USERNAME: "${MAIL_USERNAME:-your-email@gmail.com}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-your-app-password}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      KAFKA_NOTIFICATIONS_ENABLED: ${KAFKA_NOTIFICATIONS_ENABLED:-false}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_FILE_STORAGE_UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  # Next.js Frontend (Standalone)
  frontend:
    image: scenehive-frontend:local
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: auth-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8081
      TMDB_API_KEY: ${TMDB_API_KEY:-placeholder-tmdb-api-key}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  uploads_data:
