services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: scenehive-db
    environment:
      POSTGRES_USER: ${DB_USER:-testuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testuser}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-testuser} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: scenehive-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: scenehive-kafka
    profiles:
      - kafka
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kafka-init:
    image: bitnami/kafka:3.7
    profiles:
      - kafka
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        set -e
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.retry.1m.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.retry.5m.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scenehive.notification.command.dlq.v1 --partitions ${KAFKA_NOTIFICATION_COMMAND_PARTITIONS:-1} --replication-factor 1

  # Spring Boot Backend - Image based (from GHCR)
  backend:
    image: ghcr.io/${IMAGE_NAME:-your-org/scenehive}-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: scenehive-backend
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-postgres}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-testuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-testuser}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_CLIENT_AUTH_METHOD: ${KAKAO_CLIENT_AUTH_METHOD:-none}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      NAVER_CLIENT_AUTH_METHOD: ${NAVER_CLIENT_AUTH_METHOD:-client_secret_post}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-eW91ci0yNTYtYml0LXNlY3JldC1rZXktaGVyZS1tdXN0LWJlLWF0LWxlYXN0LTMyLWNoYXJhY3RlcnMtbG9uZy1mb3Itc2VjdXJpdHk=}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      APP_FILE_STORAGE_UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  # Next.js Frontend - Image based (from GHCR)
  frontend:
    image: ghcr.io/${IMAGE_NAME:-your-org/scenehive}-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: scenehive-frontend
    ports:
      - "80:3000"
    environment:
      BACKEND_URL: http://backend:8081
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_TMDB_IMAGE_BASE_URL: ${NEXT_PUBLIC_TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}
      NEXT_PUBLIC_OAUTH_BASE_URL: ${NEXT_PUBLIC_OAUTH_BASE_URL:-}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  uploads_data:
