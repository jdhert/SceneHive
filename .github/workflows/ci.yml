name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image_tags
        if: github.event_name == 'push'
        run: |
          backend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend"
          frontend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend"

          backend_tags="${backend_image}:${{ github.sha }}"
          frontend_tags="${frontend_image}:${{ github.sha }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            backend_tags="${backend_tags}"$'\n'"${backend_image}:${GITHUB_REF_NAME}"
            frontend_tags="${frontend_tags}"$'\n'"${frontend_image}:${GITHUB_REF_NAME}"
          fi

          {
            echo "backend<<EOF"
            echo "${backend_tags}"
            echo "EOF"
            echo "frontend<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ github.event_name == 'push' && steps.image_tags.outputs.backend || 'scenehive-backend:pr' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ github.event_name == 'push' && steps.image_tags.outputs.frontend || 'scenehive-frontend:pr' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_TMDB_IMAGE_BASE_URL=https://image.tmdb.org/t/p
            NEXT_PUBLIC_OAUTH_BASE_URL=
