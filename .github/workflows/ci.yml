name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backend CI
  backend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build backend
        run: ./gradlew build -x test

      - name: Test backend
        run: ./gradlew test

      - name: Build backend Docker image
        run: |
          docker compose build backend

  # Frontend CI
  frontend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-next

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend-next

      - name: Test frontend
        run: npm test -- --passWithNoTests
        working-directory: frontend-next

      - name: Build frontend
        run: npm run build
        working-directory: frontend-next

      - name: Build frontend Docker image
        run: |
          docker compose build frontend

  # Smoke test (optional - runs docker compose)
  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build --parallel

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health with retry
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 60
          wait_seconds: 5
          max_attempts: 12
          command: curl -sf http://localhost:8081/actuator/health

      - name: Check frontend health
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Stop services
        if: always()
        run: docker compose down

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, smoke-test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: image_tags
        run: |
          backend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend"
          frontend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend"

          backend_tags="${backend_image}:${{ github.sha }}"
          frontend_tags="${frontend_image}:${{ github.sha }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            backend_tags="${backend_tags}"$'\n'"${backend_image}:${release_tag}"
            frontend_tags="${frontend_tags}"$'\n'"${frontend_image}:${release_tag}"
          fi

          {
            echo "backend<<EOF"
            echo "${backend_tags}"
            echo "EOF"
            echo "frontend<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_TMDB_IMAGE_BASE_URL=https://image.tmdb.org/t/p
            NEXT_PUBLIC_OAUTH_BASE_URL=
