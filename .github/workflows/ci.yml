name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      app_services: ${{ steps.detect.outputs.app_services }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deployment targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          backend_changed=false
          frontend_changed=false
          reason="path-filter"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            backend_changed=true
            frontend_changed=true
            reason="tag"
          else
            base="${{ github.event.before }}"
            if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              base="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi

            if [[ -n "${base}" ]]; then
              changed_files="$(git diff --name-only "${base}" "${GITHUB_SHA}")"
            else
              changed_files="$(git show --name-only --format= "${GITHUB_SHA}")"
            fi

            echo "Changed files:"
            printf '%s\n' "${changed_files}"

            while IFS= read -r file; do
              [[ -z "${file}" ]] && continue

              case "${file}" in
                frontend-next/*)
                  frontend_changed=true
                  ;;
                src/*|build.gradle*|settings.gradle*|gradle/*|gradlew|gradlew.bat|Dockerfile)
                  backend_changed=true
                  ;;
                docker-compose.prod.yml|deploy.sh|.github/workflows/ci.yml|.github/workflows/cd-staging.yml)
                  backend_changed=true
                  frontend_changed=true
                  reason="deploy-contract"
                  ;;
              esac
            done <<< "${changed_files}"
          fi

          deploy_needed=false
          app_services=""

          if ${backend_changed}; then
            deploy_needed=true
            app_services="backend"
          fi

          if ${frontend_changed}; then
            deploy_needed=true
            if [[ -n "${app_services}" ]]; then
              app_services="${app_services} frontend"
            else
              app_services="frontend"
            fi
          fi

          {
            echo "deploy_needed=${deploy_needed}"
            echo "backend_changed=${backend_changed}"
            echo "frontend_changed=${frontend_changed}"
            echo "app_services=${app_services}"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"

          echo "Deploy needed: ${deploy_needed}"
          echo "Backend changed: ${backend_changed}"
          echo "Frontend changed: ${frontend_changed}"
          echo "App services: ${app_services:-none}"
          echo "Reason: ${reason}"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image_tags
        run: |
          backend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend"
          frontend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend"

          backend_tags="${backend_image}:${{ github.sha }}"
          frontend_tags="${frontend_image}:${{ github.sha }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            backend_tags="${backend_tags}"$'\n'"${backend_image}:${GITHUB_REF_NAME}"
            frontend_tags="${frontend_tags}"$'\n'"${frontend_image}:${GITHUB_REF_NAME}"
          fi

          {
            echo "backend<<EOF"
            echo "${backend_tags}"
            echo "EOF"
            echo "frontend<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        if: needs.detect-changes.outputs.backend_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.backend }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        if: needs.detect-changes.outputs.frontend_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.frontend }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_TMDB_IMAGE_BASE_URL=https://image.tmdb.org/t/p
            NEXT_PUBLIC_OAUTH_BASE_URL=

  deploy-staging:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.deploy_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          APP_SERVICES: ${{ needs.detect-changes.outputs.app_services }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh staging
