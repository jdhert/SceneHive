name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags-ignore: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backend CI
  backend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build backend
        run: ./gradlew build -x test

      - name: Test backend
        run: ./gradlew test

      - name: Build backend Docker image
        run: |
          docker compose build backend

  # Frontend CI
  frontend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-next

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend-next

      - name: Test frontend
        run: npm test -- --passWithNoTests
        working-directory: frontend-next

      - name: Build frontend
        run: npm run build
        working-directory: frontend-next

      - name: Build frontend Docker image
        run: |
          docker compose build frontend

  # Smoke test (optional - runs docker compose)
  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build --parallel

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health with retry
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 60
          wait_seconds: 5
          max_attempts: 12
          command: curl -sf http://localhost:8081/actuator/health

      - name: Check frontend health
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Stop services
        if: always()
        run: docker compose down
