name: CD - Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Validated image SHA or release tag to deploy'
        required: false
        type: string
      rollback:
        description: 'Rollback to previous version?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Resolve production image tag
        id: image_tag
        shell: bash
        run: |
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            echo "value=rollback" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag is required when rollback is false" >&2
            exit 1
          fi

          echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Validate production image tag format
        if: ${{ github.event.inputs.rollback != 'true' }}
        shell: bash
        run: |
          image_tag="${{ steps.image_tag.outputs.value }}"

          if [[ "$image_tag" =~ ^[0-9a-f]{40}$ ]]; then
            exit 0
          fi

          if [[ "$image_tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z._-]+)?$ ]]; then
            exit 0
          fi

          echo "image_tag must be a full commit SHA or a release tag like v1.2.3" >&2
          exit 1

      - name: Normalize image name
        if: ${{ github.event.inputs.rollback != 'true' }}
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: ${{ github.event.inputs.rollback != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify production images exist in GHCR
        if: ${{ github.event.inputs.rollback != 'true' }}
        shell: bash
        run: |
          backend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:${{ steps.image_tag.outputs.value }}"
          frontend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend:${{ steps.image_tag.outputs.value }}"

          docker manifest inspect "$backend_image" > /dev/null
          docker manifest inspect "$frontend_image" > /dev/null

      - name: Checkout deploy script
        uses: actions/checkout@v6
        with:
          ref: main
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          TAG: ${{ steps.image_tag.outputs.value }}
          ENV_FILE_CONTENT: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          chmod +x deploy.sh
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            ./deploy.sh rollback
          else
            ./deploy.sh production
          fi

  notify-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-production
    if: always()

    steps:
      - name: Send deployment notification
        if: needs.deploy-production.result == 'success'
        run: |
          echo "Production deployment completed: ${{ github.event.inputs.image_tag }}"

      - name: Send failure notification
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "Production deployment failed: ${{ github.event.inputs.image_tag }}"
          exit 1
