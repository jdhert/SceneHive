name: CD - Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      rollback:
        description: 'Rollback to previous version?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-production:
    if: ${{ github.event.inputs.rollback != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend:${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_API_URL || '/api' }}
            NEXT_PUBLIC_TMDB_IMAGE_BASE_URL=${{ vars.PRODUCTION_TMDB_IMAGE_BASE_URL || 'https://image.tmdb.org/t/p' }}
            NEXT_PUBLIC_OAUTH_BASE_URL=${{ vars.PRODUCTION_OAUTH_BASE_URL || '' }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push-production
    if: ${{ github.event.inputs.rollback == 'true' || needs.build-and-push-production.result == 'success' }}
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag }}
          ENV_FILE_CONTENT: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          chmod +x deploy.sh
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            ./deploy.sh rollback
          else
            ./deploy.sh production
          fi

  notify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()

    steps:
      - name: Send deployment notification
        if: needs.deploy-production.result == 'success'
        run: |
          echo "✅ Production deployment completed: ${{ github.event.inputs.tag }}"

      - name: Send failure notification
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "❌ Production deployment failed: ${{ github.event.inputs.tag }}"
          exit 1
