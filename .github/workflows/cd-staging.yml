name: CD - Staging (Manual)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image SHA to deploy (leave empty for rollback)'
        required: false
        type: string
      rollback:
        description: 'Rollback to previous version?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ github.event.inputs.rollback }}" != "true" ] && [ -z "${{ github.event.inputs.sha }}" ]; then
            echo "sha is required when rollback is false" >&2
            exit 1
          fi

      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy or rollback
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          SHA: ${{ github.event.inputs.sha }}
          ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x deploy.sh
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            ./deploy.sh rollback
          else
            ./deploy.sh staging
          fi
