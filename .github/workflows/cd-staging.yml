name: CD - Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image SHA tag to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Resolve deploy SHA
        id: deploy_sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy SHA format
        run: |
          sha="${{ steps.deploy_sha.outputs.value }}"
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Deploy SHA must be a full 40-character commit SHA." >&2
            exit 1
          fi
        shell: bash

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify staging images exist in GHCR
        run: |
          backend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:${{ steps.deploy_sha.outputs.value }}"
          frontend_image="${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend:${{ steps.deploy_sha.outputs.value }}"

          docker manifest inspect "$backend_image" > /dev/null
          docker manifest inspect "$frontend_image" > /dev/null
        shell: bash

      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          SHA: ${{ steps.deploy_sha.outputs.value }}
          ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh staging
