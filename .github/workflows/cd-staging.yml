name: CD - Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEPLOY_SCRIPT: deploy.sh

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=staging,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:staging
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend:staging
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_TMDB_IMAGE_BASE_URL=${{ vars.STAGING_TMDB_IMAGE_BASE_URL }}
            NEXT_PUBLIC_OAUTH_BASE_URL=${{ vars.STAGING_OAUTH_BASE_URL }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
            .env.staging.example
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.image_name.outputs.value }}
          SHA: ${{ github.sha }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh staging
