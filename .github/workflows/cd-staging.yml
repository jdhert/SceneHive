name: CD - Staging (Manual)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image SHA to deploy (leave empty for rollback)'
        required: false
        type: string
      rollback:
        description: 'Rollback to previous version?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ github.event.inputs.rollback }}" != "true" ] && [ -z "${{ github.event.inputs.sha }}" ]; then
            echo "sha is required when rollback is false" >&2
            exit 1
          fi

      - name: Checkout deploy script
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known hosts
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -p "${STAGING_PORT}" -H "${STAGING_HOST}" >> ~/.ssh/known_hosts; then
              exit 0
            fi

            echo "ssh-keyscan failed on attempt ${attempt}/5. Retrying in 5s..."
            sleep 5
          done

          echo "Failed to scan SSH host key after 5 attempts." >&2
          exit 1

      - name: Verify SSH connectivity
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
        run: |
          for attempt in 1 2 3 4 5; do
            if ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              -o ConnectionAttempts=1 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=2 \
              -p "${PORT}" \
              "${USER}@${HOST}" \
              "echo ssh-ok"; then
              exit 0
            fi

            echo "SSH preflight failed on attempt ${attempt}/5. Retrying in 5s..."
            sleep 5
          done

          echo "SSH preflight failed after 5 attempts." >&2
          exit 1

      - name: Deploy or rollback
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          PORT: ${{ secrets.STAGING_PORT || '22' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          SHA: ${{ github.event.inputs.sha }}
          ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x deploy.sh
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            ./deploy.sh rollback
          else
            ./deploy.sh staging
          fi
