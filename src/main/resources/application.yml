spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    driver-class-name: org.postgresql.Driver
    username: testuser
    password: testuser
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:placeholder-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: ${KAKAO_CLIENT_AUTH_METHOD:none}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            scope:
              - account_email
              - profile_nickname
              - profile_image
          naver:
            client-id: ${NAVER_CLIENT_ID:placeholder-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:}
            client-authentication-method: ${NAVER_CLIENT_AUTH_METHOD:client_secret_post}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            scope:
              - name
              - email
              - profile_image
              - nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: eW91ci0yNTYtYml0LXNlY3JldC1rZXktaGVyZS1tdXN0LWJlLWF0LWxlYXN0LTMyLWNoYXJhY3RlcnMtbG9uZy1mb3Itc2VjdXJpdHk=
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 8081

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  async:
    mail:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 200
      keep-alive-seconds: 60
      thread-name-prefix: mail-async-
      retry:
        max-attempts: 5
        initial-delay-seconds: 5
        max-delay-seconds: 300
        backoff-multiplier: 2.0
        batch-size: 20
        poll-interval-ms: 3000
  file-storage:
    upload-dir: ./uploads
    avatar-dir: avatars
    allowed-types: image/jpeg,image/png,image/gif,image/webp
    max-avatar-size: 5242880

# Actuator configuration (expose only health and info)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    defaults:
      enabled: true
